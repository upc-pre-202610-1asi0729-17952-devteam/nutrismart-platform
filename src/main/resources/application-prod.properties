spring.datasource.url=jdbc:mysql://${DATABASE_URL}:${DATABASE_PORT}/${DATABASE_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

openweathermap.api-key=${OPENWEATHERMAP_API_KEY}
openweathermap.base-url=https://api.openweathermap.org/data/2.5

usda.fooddata.api-key=${USDA_API_KEY}
usda.fooddata.base-url=https://api.nal.usda.gov/fdc/v1

deepseek.api-key=${DEEPSEEK_API_KEY}
deepseek.base-url=https://api.deepseek.com
deepseek.model=deepseek-chat

gemini.api-key=${GEMINI_API_KEY}
gemini.base-url=https://generativelanguage.googleapis.com
gemini.model=gemini-2.5-flash-lite

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.base-url=${APP_BASE_URL}
app.mail.from=${APP_MAIL_FROM}

# ── Data Seeder ──────────────────────────────────────────────────────────────
seeder.enabled=true
seeder.foods.min-count=200
seeder.foods.queries=chicken breast,salmon fillet,brown rice,broccoli,oats,eggs,banana,black beans,greek yogurt,almonds,sweet potato,spinach,tuna,quinoa,lentils
seeder.foods.max-results=25
seeder.foods.data-type=Foundation
seeder.recipes.min-count=20
seeder.recipes.categories=Proteins,Vegetables,Grains,Dairy,Fruits
seeder.recipes.max-per-goal=20
