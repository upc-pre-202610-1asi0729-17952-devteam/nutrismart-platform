name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and Release JAR
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Read version from pom.xml
        id: version
        run: echo "value=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Get JAR filename
        id: jar
        run: echo "file=$(ls target/*.jar | grep -v 'original' | head -1)" >> $GITHUB_OUTPUT

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.value }} || echo "Tag already exists, skipping"
          git push origin v${{ steps.version.outputs.value }} || echo "Tag already pushed, skipping"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: "Release v${{ steps.version.outputs.value }}"
          body: "Automated release from main branch."
          files: ${{ steps.jar.outputs.file }}
